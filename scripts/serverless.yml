service: ai-agent-serverless

frameworkVersion: '3'

provider:
  name: aws
  runtime: java17
  region: us-east-1
  memorySize: 512
  timeout: 30
  environment:
    OPENAI_API_KEY: ${env:OPENAI_API_KEY}
    OPENAI_MODEL: gpt-4
    STABILITY_API_KEY: ${env:STABILITY_API_KEY}
    ALLOWED_ORIGINS: ${env:ALLOWED_ORIGINS, 'https://your-frontend-domain.s3-website-us-east-1.amazonaws.com'}

functions:
  # Chat API
  chat:
    handler: techchamps.io.aiagent.handler.ChatHandler::handleRequest
    events:
      - http:
          path: /api/chat
          method: post
          cors: true
  
  # Image Generation API
  generateImage:
    handler: techchamps.io.aiagent.handler.ImageHandler::handleRequest
    events:
      - http:
          path: /api/images/generate
          method: post
          cors: true
  
  # GitHub Integration API
  githubAuth:
    handler: techchamps.io.aiagent.handler.GitHubHandler::handleRequest
    events:
      - http:
          path: /api/github/authenticate
          method: post
          cors: true
  
  # Repository API
  repositories:
    handler: techchamps.io.aiagent.handler.RepositoryHandler::handleRequest
    events:
      - http:
          path: /api/github/repositories
          method: post
          cors: true
  
  # Coding Chat API
  codingChat:
    handler: techchamps.io.aiagent.handler.CodingHandler::handleRequest
    events:
      - http:
          path: /api/coding-chat
          method: post
          cors: true

resources:
  Resources:
    # S3 Bucket for frontend hosting
    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ai-agent-frontend-${sls:stage}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html
    
    # S3 Bucket Policy for public read access
    FrontendBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref FrontendBucket
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: !Sub '${FrontendBucket}/*'
    
    # CloudFront Distribution for HTTPS
    CloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Origins:
            - DomainName: !GetAtt FrontendBucket.RegionalDomainName
              Id: S3Origin
              S3OriginConfig:
                OriginAccessIdentity: !Ref CloudFrontOAI
          Enabled: true
          DefaultRootObject: index.html
          DefaultCacheBehavior:
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # Managed-CachingOptimized
          CustomErrorResponses:
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
          ViewerCertificate:
            CloudFrontDefaultCertificate: true
    
    # CloudFront Origin Access Identity
    CloudFrontOAI:
      Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
      Properties:
        CloudFrontOriginAccessIdentityConfig:
          Comment: !Sub 'OAI for ${AWS::StackName}'

  Outputs:
    ApiGatewayUrl:
      Description: API Gateway URL
      Value: !Sub 'https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${sls:stage}'
    
    FrontendUrl:
      Description: Frontend URL
      Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    
    S3BucketName:
      Description: S3 Bucket for frontend
      Value: !Ref FrontendBucket 